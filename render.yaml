services:
  - type: web
    name: sentiment-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SENTIMENT_MODEL
        value: nlptown/bert-base-multilingual-uncased-sentiment
      - key: PYTHON_VERSION
        value: "3.11.0"
