name: Deploy

on:
  push:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v

  deploy-railway:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Railway deploy hint
        run: |
          echo "Railway: https://railway.app — 2 services from one GitHub repo"
          echo "API:    config railway.api.toml, Dockerfile.api"
          echo "UI:     config railway.streamlit.toml, Dockerfile.streamlit, env API_URL"
          echo "Optional: RAILWAY_TOKEN in secrets for railwayapp/railway-deploy action"
