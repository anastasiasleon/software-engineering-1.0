name: Deploy

on:
  push:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v

  deploy-hf:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Hugging Face Spaces
        run: |
          echo "Deploy: https://huggingface.co/new"
          echo "1) Docker Space, root dir hf-api (backend)"
          echo "2) Streamlit Space, root dir hf-app, secret API_URL"
          echo "Spaces auto-rebuild when connected to GitHub on push."
